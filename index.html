<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDNIGHTHUB — Executor Compatibility</title>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #181818;
    --border: #2a2a2a;
    --accent: #c0392b;
    --accent2: #e74c3c;
    --green: #22d3a5;
    --red: #c0392b;
    --yellow: #f59e0b;
    --text: #eeeeee;
    --muted: #666666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* HEADER */
  header {
    padding: 48px 0 36px;
    text-align: center;
  }

  .logo-img {
    width: 90px;
    height: 90px;
    border-radius: 20px;
    margin-bottom: 16px;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px 0 36px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .stat-pill .val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-pill.green .val { color: var(--green); }
  .stat-pill.blue .val { color: var(--accent); }

  /* SEARCH & FILTERS */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: Arial, sans-serif;
    font-size: 13px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: Arial, sans-serif;
    font-size: 12px;
    padding: 11px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(192,57,43,0.08);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* CARDS GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeIn 0.35s ease both;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(192,57,43,0.25);
  }

  .card.updated  { border-left: 3px solid var(--green); }
  .card.outdated { border-left: 3px solid var(--red); opacity: 0.75; }
  .card.free-tag { border-left: 3px solid var(--accent2); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-badge.updated {
    background: rgba(34,211,165,0.12);
    color: var(--green);
    border: 1px solid rgba(34,211,165,0.25);
  }

  .status-badge.outdated {
    background: rgba(244,63,94,0.12);
    color: var(--red);
    border: 1px solid rgba(244,63,94,0.25);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .tag.sunc {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.25);
    color: var(--accent2);
  }

  .tag.free {
    background: rgba(34,211,165,0.08);
    border-color: rgba(34,211,165,0.2);
    color: var(--green);
  }

  .tag.paid {
    background: rgba(245,158,11,0.08);
    border-color: rgba(245,158,11,0.2);
    color: var(--yellow);
  }

  .tag.platform {
    background: rgba(192,57,43,0.08);
    border-color: rgba(192,57,43,0.2);
    color: var(--accent);
  }

  .tag.detected {
    background: rgba(244,63,94,0.1);
    border-color: rgba(244,63,94,0.25);
    color: var(--red);
  }

  .card-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 12px;
  }

  .card-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sunc-bar-wrap { margin-top: 12px; }

  .sunc-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sunc-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .sunc-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  .card-links {
    margin-top: 14px;
    display: flex;
    gap: 8px;
  }

  .link-btn {
    flex: 1;
    text-align: center;
    text-decoration: none;
    font-size: 11px;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface2);
    transition: all 0.15s;
  }

  .link-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px 20px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  .loading p {
    color: var(--muted);
    font-size: 13px;
  }

  /* ERROR */
  .error-box {
    border: 1px solid rgba(244,63,94,0.25);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
    color: var(--red);
    font-size: 13px;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  footer {
    text-align: center;
    padding-top: 40px;
    color: var(--muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
  }

  .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(34,211,165,0.5);
    animation: pulse 1.8s ease infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,211,165,0.5); }
    70% { box-shadow: 0 0 0 7px rgba(34,211,165,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,211,165,0); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <img class="logo-img" src="https://i.ibb.co/9m4MLDwZ/image-23.png" alt="MIDNIGHTHUB Logo" onerror="this.style.display='none'">
    <p class="subtitle">NESSE SITE VOCÊ PODERÁ VER OS EXECUTORES QUE O MIDNIGHTHUB É COMPATÍVEL</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill">
      <span>⏳</span>
      <span>Carregando...</span>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar executor..." oninput="render()">
    </div>
    <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">Todos</button>
    <button class="filter-btn" id="btnUpdated" onclick="setFilter('updated')">✅ Atualizados</button>
    <button class="filter-btn" id="btnFree" onclick="setFilter('free')">🟢 Gratuitos</button>
    <button class="filter-btn" id="btnSunc" onclick="setFilter('sunc')">sUNC 100%</button>
    <button class="filter-btn" id="btnWindows" onclick="setFilter('windows')">🖥️ PC</button>
    <button class="filter-btn" id="btnMobile" onclick="setFilter('mobile')">📱 Mobile</button>
  </div>

  <div id="sectionLabel" class="section-label" style="display:none"></div>
  <div id="grid" class="grid"></div>

  <footer>
    <p>MIDNIGHTHUB © 2026</p>
  </footer>

</div>

<script>
let allData = [];
let currentFilter = 'all';

const TARGET = 'https://weao.xyz/api/status/exploits';
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

const ALLOWED = ['delta','codex','potassium','ronix','madium','cosmic'];

async function tryProxy(proxyFn) {
  const url = proxyFn(TARGET);
  const res = await fetch(url, { signal: AbortSignal.timeout(7000) });
  if (!res.ok) throw new Error('bad status');
  const text = await res.text();
  // allorigins wraps in {contents:...}, others return raw
  try {
    const json = JSON.parse(text);
    if (json.contents) return JSON.parse(json.contents);
    return json;
  } catch {
    return JSON.parse(text);
  }
}

async function fetchData() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>BUSCANDO DADOS...</p></div>`;

  let data = null;
  for (const proxyFn of PROXIES) {
    try {
      data = await tryProxy(proxyFn);
      if (data) break;
    } catch(e) {
      continue;
    }
  }

  if (!data) {
    grid.innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <p style="font-size:20px;margin-bottom:10px">⚠️</p>
        <p>Não foi possível conectar. Tente novamente.</p>
        <button onclick="fetchData()" style="margin-top:16px;background:transparent;border:1px solid rgba(192,57,43,0.3);color:#c0392b;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:Arial,sans-serif;font-size:12px">↺ Tentar novamente</button>
      </div>`;
    document.getElementById('statsBar').innerHTML = '';
    return;
  }

  const raw = Array.isArray(data) ? data : (data.exploits || data.data || []);
  allData = raw.filter(e => ALLOWED.includes((e.title || '').toLowerCase()));
  updateStats();
  render();
}

function isMobile(e) {
  const p = (e.platform || '').toLowerCase();
  const t = (e.type || e.extype || '').toLowerCase();
  return p === 'android' || p === 'ios' || p === 'mobile' ||
         t === 'android' || t === 'ios' || t === 'mobile' ||
         t.includes('android') || t.includes('ios');
}

function platformLabel(e) {
  if (isMobile(e)) {
    const t = (e.platform || e.type || e.extype || '').toLowerCase();
    if (t.includes('ios')) return '🍎 iOS';
    return '📱 Android';
  }
  return '🖥️ Windows';
}

function updateStats() {
  const total = allData.length;
  const updated = allData.filter(e => e.updateStatus === true).length;
  const free = allData.filter(e => e.free === true).length;
  const mobile = allData.filter(e => isMobile(e)).length;
  const pc = allData.filter(e => !isMobile(e)).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill blue"><span>📦</span><div><div class="val">${total}</div>Total</div></div>
    <div class="stat-pill green"><span class="pulse"></span><div><div class="val">${updated}</div>Atualizados</div></div>
    <div class="stat-pill"><span>🖥️</span><div><div class="val">${pc}</div>PC</div></div>
    <div class="stat-pill"><span>📱</span><div><div class="val">${mobile}</div>Mobile</div></div>
    <div class="stat-pill"><span>🟢</span><div><div class="val">${free}</div>Gratuitos</div></div>
  `;
}

function setFilter(f) {
  currentFilter = f;
  ['all','updated','free','sunc','windows','mobile'].forEach(id => {
    const el = document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1));
    if (el) el.classList.remove('active');
  });
  const el = document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1));
  if (el) el.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let data = [...allData];
  if (q) data = data.filter(e => (e.title || '').toLowerCase().includes(q));
  if (currentFilter === 'updated') data = data.filter(e => e.updateStatus === true);
  if (currentFilter === 'free')    data = data.filter(e => e.free === true);
  if (currentFilter === 'sunc')    data = data.filter(e => e.suncPercentage === 100);
  if (currentFilter === 'windows') data = data.filter(e => !isMobile(e));
  if (currentFilter === 'mobile')  data = data.filter(e => isMobile(e));

  const label = document.getElementById('sectionLabel');
  label.style.display = 'flex';
  label.textContent = `${data.length} resultado${data.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('grid');
  if (!data.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Nenhum executor encontrado.</div>`;
    return;
  }
  grid.innerHTML = data.map((e, i) => cardHTML(e, i)).join('');
}

function cardHTML(e, i) {
  const updated  = e.updateStatus === true;
  const free     = e.free === true;
  const detected = e.detected === true;
  const suncPct  = typeof e.suncPercentage === 'number' ? e.suncPercentage : null;
  const uncPct   = typeof e.uncPercentage  === 'number' ? e.uncPercentage  : null;
  const cost     = e.cost || (free ? 'Gratuito' : 'Pago');
  const delay    = Math.min(i * 0.04, 0.5);

  let cardClass = 'card';
  if (free)         cardClass += ' free-tag';
  else if (updated) cardClass += ' updated';
  else              cardClass += ' outdated';

  return `
  <div class="${cardClass}" style="animation-delay:${delay}s">
    <div class="card-header">
      <div class="card-title">${e.title || 'Desconhecido'}</div>
      <span class="status-badge ${updated ? 'updated' : 'outdated'}">${updated ? '✓ Atualizado' : '✗ Desatualizado'}</span>
    </div>
    <div class="tags">
      ${e.version ? `<span class="tag">${e.version}</span>` : ''}
      <span class="tag platform">${platformLabel(e)}</span>
      ${suncPct !== null ? `<span class="tag sunc">sUNC ${suncPct}%</span>` : ''}
      ${free ? `<span class="tag free">Gratuito</span>` : `<span class="tag paid">${cost}</span>`}
      ${e.decompiler  ? `<span class="tag">Decompilador</span>` : ''}
      ${e.multiInject ? `<span class="tag">Multi-injeção</span>` : ''}
      ${detected ? `<span class="tag detected">Detectado</span>` : ''}
    </div>
    ${suncPct !== null ? `
    <div class="sunc-bar-wrap">
      <div class="sunc-bar-label"><span>sUNC</span><span>${suncPct}%</span></div>
      <div class="sunc-bar"><div class="sunc-fill" style="width:${suncPct}%"></div></div>
    </div>` : ''}
    ${uncPct !== null ? `
    <div class="sunc-bar-wrap" style="margin-top:6px">
      <div class="sunc-bar-label"><span>UNC</span><span>${uncPct}%</span></div>
      <div class="sunc-bar"><div class="sunc-fill" style="width:${uncPct}%;background:linear-gradient(90deg,#e02020,#ff6060)"></div></div>
    </div>` : ''}
    <div class="card-meta">
      ${e.updatedDate ? `<span>🕐 ${e.updatedDate}</span>` : ''}
      ${e.rbxversion  ? `<span>🎮 ${e.rbxversion}</span>`  : ''}
    </div>
    <div class="card-links">
      ${e.websitelink  ? `<a class="link-btn" href="${e.websitelink}"  target="_blank">🌐 Site</a>`    : ''}
      ${e.discordlink  ? `<a class="link-btn" href="${e.discordlink}"  target="_blank">💬 Discord</a>` : ''}
      ${e.purchaselink ? `<a class="link-btn" href="https://bloxshadow.com/" target="_blank">🛒 Comprar</a>` : ''}
    </div>
  </div>`;
}

fetchData();
</script>
</body>
</html>
