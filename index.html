<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDNIGHTHUB — Executor Compatibility</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0d1120;
    --surface2: #131929;
    --border: #1e2a42;
    --accent: #4f8cff;
    --accent2: #a78bfa;
    --green: #22d3a5;
    --red: #f43f5e;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: rgba(79,140,255,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,140,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,140,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(79,140,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* HEADER */
  header {
    padding: 48px 0 36px;
    text-align: center;
  }

  .logo-tag {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(79,140,255,0.1);
    border: 1px solid rgba(79,140,255,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px 0 36px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    transition: border-color 0.2s;
  }

  .stat-pill .val {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-pill.green .val { color: var(--green); }
  .stat-pill.red .val { color: var(--red); }
  .stat-pill.blue .val { color: var(--accent); }

  /* SEARCH & FILTERS */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 12px 14px 12px 42px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,140,255,0.12);
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 11px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    background: rgba(79,140,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* CARDS GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.35s ease both;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(79,140,255,0.35);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,140,255,0.08);
  }

  .card.updated {
    border-left: 3px solid var(--green);
  }

  .card.outdated {
    border-left: 3px solid var(--red);
    opacity: 0.75;
  }

  .card.free-tag {
    border-left: 3px solid var(--accent2);
  }

  /* Card shimmer on hover */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(79,140,255,0.4), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 8px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .status-badge.updated {
    background: rgba(34,211,165,0.12);
    color: var(--green);
    border: 1px solid rgba(34,211,165,0.25);
  }

  .status-badge.outdated {
    background: rgba(244,63,94,0.12);
    color: var(--red);
    border: 1px solid rgba(244,63,94,0.25);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .tag.sunc {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.25);
    color: var(--accent2);
  }

  .tag.free {
    background: rgba(34,211,165,0.08);
    border-color: rgba(34,211,165,0.2);
    color: var(--green);
  }

  .tag.paid {
    background: rgba(245,158,11,0.08);
    border-color: rgba(245,158,11,0.2);
    color: var(--yellow);
  }

  .card-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sunc-bar-wrap {
    margin-top: 12px;
  }

  .sunc-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .sunc-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .sunc-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  .card-links {
    margin-top: 14px;
    display: flex;
    gap: 8px;
  }

  .link-btn {
    flex: 1;
    text-align: center;
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--surface2);
    transition: all 0.15s;
  }

  .link-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,140,255,0.08);
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 80px 20px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  .loading p {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* ERROR */
  .error-box {
    background: rgba(244,63,94,0.08);
    border: 1px solid rgba(244,63,94,0.25);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
    color: var(--red);
    font-size: 13px;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding-top: 40px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.05em;
    border-top: 1px solid var(--border);
  }

  footer a { color: var(--accent); text-decoration: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(34,211,165,0.5);
    animation: pulse 1.8s ease infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,211,165,0.5); }
    70% { box-shadow: 0 0 0 7px rgba(34,211,165,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,211,165,0); }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-tag">⚡ MIDNIGHTHUB</div>
    <h1>Executor<br>Compatibility</h1>
    <p class="subtitle">Executores compatíveis com MIDNIGHTHUB • Dados em tempo real via WEAO API</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill">
      <span>⏳</span>
      <span>Carregando...</span>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar executor..." oninput="render()">
    </div>
    <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">Todos</button>
    <button class="filter-btn" id="btnUpdated" onclick="setFilter('updated')">✅ Atualizados</button>
    <button class="filter-btn" id="btnFree" onclick="setFilter('free')">🟢 Gratuitos</button>
    <button class="filter-btn" id="btnSunc" onclick="setFilter('sunc')">sUNC 100%</button>
    <button class="filter-btn" id="btnWindows" onclick="setFilter('windows')">🖥️ PC</button>
    <button class="filter-btn" id="btnMobile" onclick="setFilter('mobile')">📱 Mobile</button>
  </div>

  <div id="sectionLabel" class="section-label" style="display:none"></div>
  <div id="grid" class="grid"></div>

  <footer>
    <p>Dados fornecidos por <a href="https://weao.xyz" target="_blank">weao.xyz</a> • Atualizado em tempo real</p>
  </footer>

</div>

<script>
let allData = [];
let currentFilter = 'all';

// Proxy CORS para a API do WEAO
const API = 'https://weao.xyz/api/status/exploits';
const PROXY = 'https://api.allorigins.win/get?url=' + encodeURIComponent(API);

async function fetchData() {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><p>BUSCANDO DADOS DA API WEAO...</p></div>`;

  try {
    const res = await fetch(PROXY);
    const json = await res.json();
    const data = JSON.parse(json.contents);

    // data pode ser array ou objeto com array dentro
    allData = Array.isArray(data) ? data : (data.exploits || data.data || []);

    updateStats();
    render();
  } catch (err) {
    grid.innerHTML = `
      <div class="error-box" style="grid-column:1/-1">
        <p style="font-size:20px;margin-bottom:10px">⚠️</p>
        <p>Não foi possível conectar à API do WEAO.</p>
        <p style="margin-top:8px;font-size:11px;opacity:0.6">${err.message}</p>
        <button onclick="fetchData()" style="margin-top:16px;background:rgba(244,63,94,0.15);border:1px solid rgba(244,63,94,0.3);color:#f43f5e;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px">↺ Tentar novamente</button>
      </div>`;
    document.getElementById('statsBar').innerHTML = '';
  }
}

function updateStats() {
  const total = allData.length;
  const updated = allData.filter(e => e.updateStatus === true).length;
  const free = allData.filter(e => e.free === true).length;
  const mobile = allData.filter(e => isMobile(e)).length;
  const pc = allData.filter(e => !isMobile(e)).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill blue">
      <span>📦</span>
      <div><div class="val">${total}</div>Total</div>
    </div>
    <div class="stat-pill green">
      <span class="pulse"></span>
      <div><div class="val">${updated}</div>Atualizados</div>
    </div>
    <div class="stat-pill">
      <span>🖥️</span>
      <div><div class="val">${pc}</div>PC</div>
    </div>
    <div class="stat-pill">
      <span>📱</span>
      <div><div class="val">${mobile}</div>Mobile</div>
    </div>
    <div class="stat-pill">
      <span>🟢</span>
      <div><div class="val">${free}</div>Gratuitos</div>
    </div>
  `;
}

function setFilter(f) {
  currentFilter = f;
  ['all','updated','free','sunc','windows','mobile'].forEach(id => {
    const el = document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1));
    if (el) el.classList.remove('active');
  });
  const active = document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1));
  if (active) active.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let data = [...allData];

  // Search
  if (q) data = data.filter(e => (e.title || '').toLowerCase().includes(q));

  // Filter
  if (currentFilter === 'updated') data = data.filter(e => e.updateStatus === true);
  if (currentFilter === 'free') data = data.filter(e => e.free === true);
  if (currentFilter === 'sunc') data = data.filter(e => e.suncPercentage === 100);
  if (currentFilter === 'windows') data = data.filter(e => isMobile(e) === false);
  if (currentFilter === 'mobile') data = data.filter(e => isMobile(e) === true);

  const label = document.getElementById('sectionLabel');
  label.style.display = 'flex';
  label.textContent = `${data.length} resultado${data.length !== 1 ? 's' : ''}`;

  const grid = document.getElementById('grid');
  if (!data.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Nenhum executor encontrado com esses filtros.</div>`;
    return;
  }

  grid.innerHTML = data.map((e, i) => cardHTML(e, i)).join('');
}

function isMobile(e) {
  const p = (e.platform || '').toLowerCase();
  const t = (e.type || e.extype || '').toLowerCase();
  return p === 'android' || p === 'ios' || p === 'mobile' ||
         t === 'android' || t === 'ios' || t === 'mobile' ||
         t.includes('android') || t.includes('ios');
}

function platformIcon(e) {
  if (isMobile(e)) {
    const t = (e.platform || e.type || e.extype || '').toLowerCase();
    if (t.includes('ios')) return '🍎 iOS';
    return '📱 Android';
  }
  return '🖥️ Windows';
}

function cardHTML(e, i) {
  const updated = e.updateStatus === true;
  const free = e.free === true;
  const detected = e.detected === true;
  const suncPct = typeof e.suncPercentage === 'number' ? e.suncPercentage : null;
  const uncPct = typeof e.uncPercentage === 'number' ? e.uncPercentage : null;
  const cost = e.cost || (free ? 'Gratuito' : 'Pago');

  let cardClass = 'card';
  if (free) cardClass += ' free-tag';
  else if (updated) cardClass += ' updated';
  else cardClass += ' outdated';

  const delay = Math.min(i * 0.04, 0.5);

  return `
  <div class="${cardClass}" style="animation-delay:${delay}s">
    <div class="card-header">
      <div class="card-title">${e.title || 'Desconhecido'}</div>
      <span class="status-badge ${updated ? 'updated' : 'outdated'}">${updated ? '✓ Atualizado' : '✗ Desatualizado'}</span>
    </div>
    <div class="tags">
      ${e.version ? `<span class="tag">${e.version}</span>` : ''}
      <span class="tag" style="background:rgba(79,140,255,0.08);border-color:rgba(79,140,255,0.2);color:var(--accent)">${platformIcon(e)}</span>
      ${suncPct !== null ? `<span class="tag sunc">sUNC ${suncPct}%</span>` : ''}
      ${free ? `<span class="tag free">Gratuito</span>` : `<span class="tag paid">${cost}</span>`}
      ${e.decompiler ? `<span class="tag">Decompilador</span>` : ''}
      ${e.multiInject ? `<span class="tag">Multi-injeção</span>` : ''}
      ${detected ? `<span class="tag" style="background:rgba(244,63,94,0.1);border-color:rgba(244,63,94,0.25);color:#f43f5e">Detectado</span>` : ''}
    </div>
    ${suncPct !== null ? `
    <div class="sunc-bar-wrap">
      <div class="sunc-bar-label"><span>sUNC</span><span>${suncPct}%</span></div>
      <div class="sunc-bar"><div class="sunc-fill" style="width:${suncPct}%"></div></div>
    </div>` : ''}
    ${uncPct !== null ? `
    <div class="sunc-bar-wrap" style="margin-top:6px">
      <div class="sunc-bar-label"><span>UNC</span><span>${uncPct}%</span></div>
      <div class="sunc-bar"><div class="sunc-fill" style="width:${uncPct}%;background:linear-gradient(90deg,#a78bfa,#818cf8)"></div></div>
    </div>` : ''}
    <div class="card-meta" style="margin-top:12px">
      ${e.updatedDate ? `<span>🕐 ${e.updatedDate}</span>` : ''}
      ${e.rbxversion ? `<span>🎮 ${e.rbxversion}</span>` : ''}
    </div>
    <div class="card-links">
      ${e.websitelink ? `<a class="link-btn" href="${e.websitelink}" target="_blank">🌐 Site</a>` : ''}
      ${e.discordlink ? `<a class="link-btn" href="${e.discordlink}" target="_blank">💬 Discord</a>` : ''}
      ${e.purchaselink ? `<a class="link-btn" href="${e.purchaselink}" target="_blank">🛒 Comprar</a>` : ''}
    </div>
  </div>`;
}

fetchData();
</script>
</body>
</html>
